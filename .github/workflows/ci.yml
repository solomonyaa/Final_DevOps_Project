name: CI Workflow - test, build and run container

on:
  pull_request:
    branches:
      - main

jobs:
  test-build-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: pip install -r requirements.txt pytest

      - name: Install flake8
        run: pip install flake8

      - name: Lint with flake8
        run: flake8 Task_Manager.py Task_Module.py --max-line-length=120

      - name: Run pytest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m pytest test_Task_Manager.py -v

      - name: Build image
        run: docker build --no-cache -t shayandsolomon/cloudtasks:latest .

      - name: Run Flask container with OpenAI secret
        run: |
          docker run -d --name cloudtasks-app \
            -p 5000:5000 \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            shayandsolomon/cloudtasks:latest

      - name: Wait for Flask app
        run: |
          for i in {1..15}; do
            if curl -f http://127.0.0.1:5000/health; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done
          echo "App failed to start"
          docker logs cloudtasks-app
          exit 1

      # ─── GET /health ───────────────────────────────────────────
      - name: "GET /health"
        run: |
          echo "Testing health endpoint..."
          response=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/health)
          if [ "$response" != "200" ]; then
            echo "Expected 200 but got $response"
            exit 1
          fi
          echo "Health check passed - got 200"

      # ─── POST /tasks ───────────────────────────────────────────
      - name: "POST /tasks - create task"
        run: |
          echo "Creating task..."
          curl -sS -f -X POST http://127.0.0.1:5000/tasks \
            -H "Content-Type: application/json" \
            -d '{
              "title": "Hili",
              "details": "Hili is the best",
              "due_date": "30/04/2126",
              "category": "personal",
              "priority": "high"
            }' | tee create_task_response.json
          echo ""
          echo "Created task response:"
          cat create_task_response.json

      # ─── GET /tasks ────────────────────────────────────────────
      - name: "GET /tasks - get all tasks"
        run: |
          echo "Getting all tasks..."
          curl -sS -f http://127.0.0.1:5000/tasks

      - name: "GET /tasks - filter by category"
        run: |
          echo "Filtering tasks by category=personal..."
          curl -sS -f "http://127.0.0.1:5000/tasks?category=personal"

      - name: "GET /tasks - filter by priority"
        run: |
          echo "Filtering tasks by priority=high..."
          curl -sS -f "http://127.0.0.1:5000/tasks?priority=high"

      - name: "GET /tasks - filter by is_complete"
        run: |
          echo "Filtering tasks by is_complete=false..."
          curl -sS -f "http://127.0.0.1:5000/tasks?is_complete=false"

      # ─── GET /task/<id> ────────────────────────────────────────
      - name: "GET /task/1 - get single task"
        run: |
          echo "Getting task 1..."
          curl -sS -f http://127.0.0.1:5000/task/1

      # ─── PATCH /task/<id> ──────────────────────────────────────
      - name: "PATCH /task/1 - edit task"
        run: |
          echo "Editing task 1..."
          curl -sS -f -X PATCH http://127.0.0.1:5000/task/1 \
            -H "Content-Type: application/json" \
            -d '{
              "title": "Hili updated",
              "priority": "low"
            }'

      # ─── PATCH /task/<id>/complete ─────────────────────────────
      - name: "PATCH /task/1/complete - mark complete"
        run: |
          echo "Marking task 1 as complete..."
          curl -sS -f -X PATCH http://127.0.0.1:5000/task/1/complete \
            -H "Content-Type: application/json" \
            -d '{"is_complete": true}'

      - name: "PATCH /task/1/complete - mark incomplete"
        run: |
          echo "Marking task 1 as incomplete..."
          curl -sS -f -X PATCH http://127.0.0.1:5000/task/1/complete \
            -H "Content-Type: application/json" \
            -d '{"is_complete": false}'

      # ─── POST /task/<id>/ask ───────────────────────────────────
      - name: "POST /task/1/ask - ask AI about task"
        run: |
          echo "Asking OpenAI about task 1..."
          curl -sS -f -X POST http://127.0.0.1:5000/task/1/ask \
            -H "Content-Type: application/json" \
            -d '{
              "question": "Give me a short nice answer about Hili."
            }' | tee ask_response.json
          echo ""
          echo "Ask response:"
          cat ask_response.json
          echo "### Ask response" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat ask_response.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ─── DELETE /task/<id> ─────────────────────────────────────
      - name: "DELETE /task/1 - delete task"
        run: |
          echo "Deleting task 1..."
          curl -sS -f -X DELETE http://127.0.0.1:5000/task/1

      - name: "GET /task/1 - verify task deleted"
        run: |
          echo "Verifying task 1 is deleted..."
          response=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/task/1)
          if [ "$response" != "404" ]; then
            echo "Expected 404 but got $response"
            exit 1
          fi
          echo "Task correctly deleted - got 404"

      # ─── Cleanup ───────────────────────────────────────────────
      - name: Show container logs
        if: always()
        run: |
          docker logs cloudtasks-app || true

      - name: Stop container
        if: always()
        run: |
          docker stop cloudtasks-app || true
