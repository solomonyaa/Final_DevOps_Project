name: CI Workflow - test, build and run container

on:
  push:
    branches:
      - Shayha-app
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-with-postgres:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start PostgreSQL stack
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for Flask app
        run: |
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:5000/health; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 3
          done
          echo "App failed to start"
          docker compose -f docker-compose.yml logs
          exit 1

      # ─── GET /health ───────────────────────────────────────────
      - name: "GET /health"
        run: |
          response=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/health)
          if [ "$response" != "200" ]; then echo "Expected 200 but got $response"; exit 1; fi
          echo "Health check passed - got 200"

      # ─── POST /users/register ──────────────────────────────────
      - name: "POST /users/register - create test user"
        run: |
          response=$(curl -sS -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:5000/users/register \
            -H "Content-Type: application/json" \
            -d '{"username": "testuser", "password": "testpass123"}')
          if [ "$response" != "201" ]; then echo "Expected 201 but got $response"; exit 1; fi
          echo "User registered - got 201"

      # ─── POST /tasks ───────────────────────────────────────────
      - name: "POST /tasks - create task"
        run: |
          curl -sS -f -X POST http://127.0.0.1:5000/tasks \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{"title":"DB task","details":"PostgreSQL test","due_date":"30/04/2126","category":"work","priority":"high"}'

      # ─── GET /tasks ────────────────────────────────────────────
      - name: "GET /tasks - get all tasks"
        run: curl -sS -f http://127.0.0.1:5000/tasks -u testuser:testpass123

      # ─── GET /task/<id> ────────────────────────────────────────
      - name: "GET /task/1 - get single task"
        run: curl -sS -f http://127.0.0.1:5000/task/1 -u testuser:testpass123

      # ─── PATCH /task/<id> ──────────────────────────────────────
      - name: "PATCH /task/1 - edit task"
        run: |
          curl -sS -f -X PATCH http://127.0.0.1:5000/task/1 \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{"title": "Updated DB task", "priority": "low"}'

      # ─── PATCH /task/<id>/complete ─────────────────────────────
      - name: "PATCH /task/1/complete - mark complete"
        run: |
          curl -sS -f -X PATCH http://127.0.0.1:5000/task/1/complete \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{"is_complete": true}'

      # ─── Test unauthorized access ──────────────────────────────
      - name: "GET /tasks - no auth returns 401"
        run: |
          response=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/tasks)
          if [ "$response" != "401" ]; then echo "Expected 401 but got $response"; exit 1; fi
          echo "Unauthorized access correctly rejected - got 401"

      # ─── Show tasks from DB ────────────────────────────────────
      # ─── Show tasks from DB ────────────────────────────────────
      - name: "Debug - list running containers"
        run: docker ps --format '{{.Names}}'

      - name: "Show users and tasks from PostgreSQL"
        run: |
          docker exec cloudstasks-db-1 psql -U user -d taskdb -c "SELECT * FROM users;"
          docker exec cloudstasks-db-1 psql -U user -d taskdb -c "SELECT * FROM tasks;"

      # ─── Cleanup ───────────────────────────────────────────────
      - name: Show logs
        if: always()
        run: docker compose -f docker-compose.yml logs

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.yml down
