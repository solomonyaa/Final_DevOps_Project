name: CI Workflow - test, build and run container

on:
  push:
    branches:
      - Shayha-app
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-build-run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: pip install -r requirements.txt pytest

      - name: Install flake8
        run: pip install flake8

      - name: Lint with flake8
        run: flake8 Task_Manager.py Task_Module.py User_Module.py --max-line-length=120

      - name: Build image
        run: docker build --no-cache -t ${{ secrets.DOCKERHUB_USERNAME }}/task-manager:latest .

      - name: Run Flask container
        run: |
          docker run -d --name task-manager-app \
            -p 5000:5000 \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/task-manager:latest

      - name: Wait for Flask app
        run: |
          for i in {1..15}; do
            if curl -f http://127.0.0.1:5000/health; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done
          echo "App failed to start"
          docker logs task-manager-app
          exit 1

      # ─── GET /health ───────────────────────────────────────────
      - name: "GET /health"
        run: |
          response=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/health)
          if [ "$response" != "200" ]; then
            echo "Expected 200 but got $response"
            exit 1
          fi
          echo "Health check passed - got 200"

      # ─── POST /users/register ──────────────────────────────────
      - name: "POST /users/register - create test user"
        run: |
          response=$(curl -sS -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:5000/users/register \
            -H "Content-Type: application/json" \
            -d '{"username": "testuser", "password": "testpass123"}')
          if [ "$response" != "201" ]; then
            echo "Expected 201 but got $response"
            exit 1
          fi
          echo "User registered - got 201"

      # ─── POST /users/register - duplicate ─────────────────────
      - name: "POST /users/register - duplicate username returns 409"
        run: |
          response=$(curl -sS -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:5000/users/register \
            -H "Content-Type: application/json" \
            -d '{"username": "testuser", "password": "testpass123"}')
          if [ "$response" != "409" ]; then
            echo "Expected 409 but got $response"
            exit 1
          fi
          echo "Duplicate user correctly rejected - got 409"

      # ─── POST /tasks ───────────────────────────────────────────
      - name: "POST /tasks - create task"
        run: |
          curl -sS -f -X POST http://127.0.0.1:5000/tasks \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{
              "title": "Test task",
              "details": "CI test task details",
              "due_date": "30/04/2126",
              "category": "work",
              "priority": "high"
            }' | tee create_task_response.json
          echo ""
          cat create_task_response.json

      # ─── GET /tasks ────────────────────────────────────────────
      - name: "GET /tasks - get all tasks"
        run: curl -sS -f http://127.0.0.1:5000/tasks -u testuser:testpass123

      - name: "GET /tasks - filter by category"
        run: curl -sS -f "http://127.0.0.1:5000/tasks?category=work" -u testuser:testpass123

      - name: "GET /tasks - filter by priority"
        run: curl -sS -f "http://127.0.0.1:5000/tasks?priority=high" -u testuser:testpass123

      - name: "GET /tasks - filter by is_complete"
        run: curl -sS -f "http://127.0.0.1:5000/tasks?is_complete=false" -u testuser:testpass123

      # ─── GET /task/<id> ────────────────────────────────────────
      - name: "GET /task/1 - get single task"
        run: curl -sS -f http://127.0.0.1:5000/task/1 -u testuser:testpass123

      # ─── PATCH /task/<id> ──────────────────────────────────────
      - name: "PATCH /task/1 - edit task"
        run: |
          curl -sS -f -X PATCH http://127.0.0.1:5000/task/1 \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{"title": "Updated task", "priority": "low"}'

      # ─── PATCH /task/<id>/complete ─────────────────────────────
      - name: "PATCH /task/1/complete - mark complete"
        run: |
          curl -sS -f -X PATCH http://127.0.0.1:5000/task/1/complete \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{"is_complete": true}'

      - name: "PATCH /task/1/complete - mark incomplete"
        run: |
          curl -sS -f -X PATCH http://127.0.0.1:5000/task/1/complete \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{"is_complete": false}'

      # ─── Test unauthorized access ──────────────────────────────
      - name: "GET /tasks - no auth returns 401"
        run: |
          response=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/tasks)
          if [ "$response" != "401" ]; then
            echo "Expected 401 but got $response"
            exit 1
          fi
          echo "Unauthorized access correctly rejected - got 401"

      # ─── POST /task/<id>/ask ───────────────────────────────────
      - name: "POST /task/1/ask - ask AI about task"
        run: |
          curl -sS -f -X POST http://127.0.0.1:5000/task/1/ask \
            -u testuser:testpass123 \
            -H "Content-Type: application/json" \
            -d '{"question": "How should I approach this task?"}' | tee ask_response.json
          echo ""
          cat ask_response.json
          echo "### Ask response" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat ask_response.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ─── DELETE /task/<id> ─────────────────────────────────────
      - name: "DELETE /task/1 - delete task"
        run: curl -sS -f -X DELETE http://127.0.0.1:5000/task/1 -u testuser:testpass123

      - name: "GET /task/1 - verify task deleted"
        run: |
          response=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/task/1 -u testuser:testpass123)
          if [ "$response" != "404" ]; then
            echo "Expected 404 but got $response"
            exit 1
          fi
          echo "Task correctly deleted - got 404"

      # ─── Cleanup ───────────────────────────────────────────────
      - name: Show container logs
        if: always()
        run: docker logs task-manager-app || true

      - name: Stop container
        if: always()
        run: docker stop task-manager-app || true
