name: Login to Dockerhub, Build, Push
on:
  push:
    branches:
      - main

jobs:
  on-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cloudtasks:latest \
                       -t ${{ secrets.DOCKERHUB_USERNAME }}/cloudtasks:${{ github.sha }} .

      - name: Push latest tag
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/cloudtasks:latest

      - name: Push SHA tag
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/cloudtasks:${{ github.sha }}