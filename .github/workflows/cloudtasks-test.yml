name: Test CloudTasks App

on:
  workflow_dispatch:

jobs:
  test-cloudtasks:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Docker image
        run: |
          docker pull shayandsolomon/cloudtasks:v1

      - name: Run Flask container with OpenAI secret
        run: |
          docker run -d --name cloudtasks-app \
            -p 5000:5000 \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            shayandsolomon/cloudtasks:v1

      - name: Wait for Flask app
        run: |
          for i in {1..15}; do
            if curl -f http://127.0.0.1:5000/health; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done

          echo "App failed to start"
          docker logs cloudtasks-app
          exit 1

      - name: Create task
        run: |
          curl -f -X POST http://127.0.0.1:5000/tasks \
            -H "Content-Type: application/json" \
            -d '{
              "title": "Hili",
              "details": "Hili the best",
              "due_date": "30/04/2026",
              "category": "personal",
              "priority": "high"
            }'

      - name: Get all tasks
        run: |
          curl -f http://127.0.0.1:5000/tasks

      - name: Ask about task
        run: |
          curl -f -X POST http://127.0.0.1:5000/task/1/ask \
            -H "Content-Type: application/json" \
            -d '{
              "question": "Give me a short nice answer about Hili."
            }'

      - name: Show container logs
        if: always()
        run: |
          docker logs cloudtasks-app || true

      - name: Stop container
        if: always()
        run: |
          docker stop cloudtasks-app || true
