name: Test CloudTasks App

on:
  workflow_dispatch:
  push:
    branches:
      - Shayha-app

jobs:
  test-cloudtasks:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Docker image
        run: |
          docker pull shayandsolomon/cloudtasks:v1

      - name: Run Flask container with OpenAI secret
        run: |
          docker run -d --name cloudtasks-app \
            -p 5000:5000 \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            shayandsolomon/cloudtasks:v1

      - name: Wait for Flask app
        run: |
          for i in {1..15}; do
            if curl -f http://127.0.0.1:5000/health; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done

          echo "App failed to start"
          docker logs cloudtasks-app
          exit 1

      - name: Create task
        run: |
          echo "Creating task..."
          curl -sS -f -X POST http://127.0.0.1:5000/tasks \
            -H "Content-Type: application/json" \
            -d '{
              "title": "Hili",
              "details": "Hili the best",
              "due_date": "30/04/2026",
              "category": "personal",
              "priority": "high"
            }' | tee create_task_response.json

          echo ""
          echo "Created task response:"
          cat create_task_response.json

      - name: Ask about task and show output
        run: |
          echo "Asking OpenAI about task 1..."
          curl -sS -f -X POST http://127.0.0.1:5000/task/1/ask \
            -H "Content-Type: application/json" \
            -d '{
              "question": "Give me a short nice answer about Hili."
            }' | tee ask_response.json

          echo ""
          echo "Ask response:"
          cat ask_response.json

          echo "### Ask response" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat ask_response.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Show container logs
        if: always()
        run: |
          docker logs cloudtasks-app || true

      - name: Stop container
        if: always()
        run: |
          docker stop cloudtasks-app || true
